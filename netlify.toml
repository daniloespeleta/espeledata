# Netlify — site estático, sem etapa de build.
# O deploy publica apenas a pasta _deploy/ (gerada por .\deploy.ps1),
# que contém somente os arquivos de produção — nunca _site-antigo/ ou _template/.

[build]
  command = "node build.js"
  publish = "_deploy"

# Paginas inexistentes dentro de /en/ servem o 404 em ingles.
# (O restante cai no /404.html PT, 404 global padrao.)
[[redirects]]
  from = "/en/*"
  to = "/en/404.html"
  status = 404

[[headers]]
  for = "/CV/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
