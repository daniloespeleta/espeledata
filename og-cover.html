<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>og-cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
body{
  background:#0a0a0a;
  font-family:'Barlow',system-ui,sans-serif;
  display:flex;align-items:center;
  position:relative;
}
/* subtle cyan glow, single accent family */
.glow{position:absolute;top:-160px;right:-160px;width:620px;height:620px;
  background:radial-gradient(ellipse,rgba(0,212,255,0.10) 0%,transparent 70%);pointer-events:none}
.wrap{padding:0 96px;position:relative;z-index:1;display:flex;gap:40px;align-items:stretch}
.bar{width:5px;background:#00d4ff;flex:0 0 auto}
.content{display:flex;flex-direction:column;justify-content:center}
.kicker{font-family:'JetBrains Mono',monospace;font-size:22px;letter-spacing:.28em;
  text-transform:uppercase;color:#00d4ff;margin-bottom:26px}
.name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:132px;line-height:.92;
  letter-spacing:.01em;text-transform:uppercase;color:#f0f0ee}
.role{font-family:'Barlow',sans-serif;font-weight:300;font-size:40px;line-height:1.25;
  color:#a3a39d;margin-top:26px;max-width:20ch}
.role b{font-weight:500;color:#f0f0ee}
.domain{font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:.14em;
  color:#888882;margin-top:52px}
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="wrap">
    <div class="bar"></div>
    <div class="content">
      <div class="kicker">CRM &amp; Lifecycle Marketing</div>
      <div class="name">Danilo<br>Espeleta</div>
      <div class="role"><b>CRM &amp; Lifecycle Marketing Specialist</b></div>
      <div class="domain">espeledata.com</div>
    </div>
  </div>
</body>
</html>
